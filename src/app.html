<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
<!--	SEO -->

		<meta property="og:site_name" content="Jitse De Smet">
<!--	End SEO -->
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="height=device-height, width=device-width, initial-scale=1.0, minimum-scale=1.0">
		<link href="/css/inter.css" rel="stylesheet">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
        <link rel="me" href="https://mastodon.social/@smetje007"/>
		<meta name="theme-color" content="#ffffff"/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div class="empty" style="display: contents">
			%sveltekit.body%
		</div>

<style>
	body {
		margin: 0;
		background-color: var(--color-bg-page);
	}
	p {
		text-justify: auto;
		text-align: justify;
		line-height: 1.75;
	}
	* {
		font-family: "Inter", sans-serif;
		font-optical-sizing: auto;
		font-weight: 300;
		font-style: normal;
		font-variation-settings:
				"slnt" 0;
		font-size: 1em;
		box-sizing: border-box;
	}
	div {
		color: var(--color-text);
	}
	ul {
		padding: 0;
		margin: 0;
		list-style-type: none;
	}
	a {
		color: var(--color-text);
	}
	html {
		--color-primary: #1a2238;
		--color-primary-light: #2d3d5c;
		--color-secondary: #ccc5b2;
		--color-tertiary: #e05c2a;
		--color-quaternary: #c8a848;

		--color-bg: #fefdf8;
		--color-bg-page: #ede8dd;
		--color-bg-subtle: #f7f3ea;
		--color-text: var(--color-primary);

		--font-serif: 'EB Garamond', Garamond, 'Book Antiqua', Palatino, Georgia, serif;
		--font-sans: "Inter", sans-serif;

		--shadow-sm: 0 1px 4px rgba(26, 34, 56, 0.07);
		--shadow-md: 0 4px 14px rgba(26, 34, 56, 0.11);
		--shadow-lg: 0 8px 36px rgba(26, 34, 56, 0.16);

		--radius-sm: 4px;
		--radius-md: 8px;
		--radius-lg: 14px;

		--transition-fast: 0.15s ease;
		--transition: 0.25s ease;

		--screen-size-big: 500px;

		scroll-behavior: smooth;
		background-color: var(--color-bg-page);
	}
	.main a {
		color: inherit;
		text-decoration: none;
		background:
				linear-gradient(
						to right,
						var(--color-primary),
						var(--color-primary)
				),
				linear-gradient(
						to right,
						var(--color-tertiary),
						var(--color-tertiary)
				);
		background-size: 100% 1px, 0 1px;
		background-position: 100% 100%, 0 100%;
		background-repeat: no-repeat;
		transition: background-size 400ms;
	}
	.main a:hover {
		background-size: 0 1px, 100% 1px;
	}
	.main a[class*='no-fancy'] {
		color: inherit;
		text-decoration: none;
		background: inherit;
		transition: none;
	}
	h1, h2, h3, h4 {
		font-family: var(--font-serif);
		font-weight: 600;
		line-height: 1.3;
		color: var(--color-primary);
	}
</style>
